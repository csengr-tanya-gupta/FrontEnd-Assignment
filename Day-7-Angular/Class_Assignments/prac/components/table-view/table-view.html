<p>table-view works!</p>
<table mat-table [dataSource]="students" class="mat-elevation-z8">
  <ng-container matColumnDef="sno">
    <th mat-header-cell *matHeaderCellDef>S.No.</th>
    <td mat-cell *matCellDef="let s">{{ s.sno }}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let s">{{ s.name }}</td>
  </ng-container>

  <ng-container matColumnDef="age">
    <th mat-header-cell *matHeaderCellDef>Age</th>
    <td mat-cell *matCellDef="let s">{{ s.age }}</td>
  </ng-container>

  <ng-container matColumnDef="qualification">
    <th mat-header-cell *matHeaderCellDef>Qualification</th>
    <td mat-cell *matCellDef="let s">{{ s.qualification }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns" ></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns; background: 'lightgray'"></tr>
</table>
<button matbutton="outlined">Click MEEEE</button>
